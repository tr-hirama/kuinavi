<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杭ナビ → GL.csv 変換ツール</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- SVG icon symbols -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <symbol id="i-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18"/>
            <path d="M12 3v18"/>
            <path d="M12 3l-3 4h6z" fill="currentColor"/>
            <circle cx="6" cy="14" r="1.5" fill="currentColor"/>
            <circle cx="18" cy="14" r="1.5" fill="currentColor"/>
            <circle cx="12" cy="14" r="1.5" fill="currentColor"/>
        </symbol>
        <symbol id="i-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
        </symbol>
        <symbol id="i-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
        </symbol>
        <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
        </symbol>
        <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </symbol>
        <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/>
        </symbol>
        <symbol id="i-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
        </symbol>
        <symbol id="i-stack" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="4" rx="1"/>
            <rect x="3" y="10" width="18" height="4" rx="1"/>
            <rect x="3" y="17" width="18" height="4" rx="1"/>
        </symbol>
        <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
        </symbol>
        <symbol id="i-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/>
            <line x1="16" y1="6" x2="16" y2="22"/>
        </symbol>
        <symbol id="i-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
        </symbol>
        <symbol id="i-file-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
            <line x1="8" y1="9"  x2="11" y2="9"/>
        </symbol>
        <symbol id="i-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </symbol>
        <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </symbol>
    </svg>
</head>
<body>
    <div class="app">
        <!-- ===== ツールバー ===== -->
        <div class="toolbar">
            <div class="brand">
                <div class="brand-mark"><svg><use href="#i-logo"/></svg></div>
                <div class="brand-text">
                    <span class="name">杭ナビ → GL.csv</span>
                    <span class="tag">CSV CONVERTER · mm → m</span>
                </div>
            </div>

            <div class="toolbar-group">
                <button id="btnSelect" class="btn">
                    <svg><use href="#i-upload"/></svg>ファイル選択
                </button>
                <button id="btnClear" class="btn btn-ghost" title="クリア">
                    <svg><use href="#i-trash"/></svg>クリア
                </button>
            </div>

            <div class="field">
                <span class="field-label">出力先</span>
                <input id="outputName" type="text" placeholder="CSV読込で自動入力 (フルパス可)">
                <button id="btnBrowse" class="btn" disabled title="名前を付けて保存... (保存先を選んでその場で書き込みます)">
                    <svg><use href="#i-folder"/></svg>別名保存…
                </button>
            </div>

            <div class="field">
                <span class="field-label">エンコーディング</span>
                <select id="encoding">
                    <option value="sjis" selected>Shift-JIS</option>
                    <option value="utf8bom">UTF-8 (BOM)</option>
                </select>
            </div>

            <button id="btnExport" class="btn btn-primary" disabled>
                <svg><use href="#i-download"/></svg>GL.csv を保存
            </button>

            <span class="spacer"></span>

            <div class="toolbar-group">
                <button id="btnEditSelectedZ" class="btn" disabled>
                    <svg><use href="#i-edit"/></svg>選択 P の Z 編集
                </button>
                <button id="btnGroupEditZ" class="btn" disabled>
                    <svg><use href="#i-layers"/></svg>グループ変更
                </button>
                <button id="btnAllEditZ" class="btn" disabled>
                    <svg><use href="#i-stack"/></svg>全本変更
                </button>
            </div>
        </div>

        <!-- ===== メイン ===== -->
        <div class="main">
            <!-- 左ペイン: グリッド -->
            <div class="panel-grid">
                <div id="dropzone" class="dropzone">
                    <div class="dz-icon"><svg><use href="#i-upload"/></svg></div>
                    <strong>CSV ファイルをここにドラッグ&amp;ドロップ</strong>
                    <span class="dz-sub">または、上の「ファイル選択」ボタンから選択してください</span>
                </div>
                <div class="section-header">
                    <svg><use href="#i-grid"/></svg>
                    <span id="gridHeader">読み込み待ち</span>
                </div>
                <div class="grid-wrap">
                    <table class="data-grid" id="dataGrid">
                        <thead>
                            <tr>
                                <th style="width:14%;">名前</th>
                                <th style="width:14%;">入力 Y (mm)</th>
                                <th style="width:14%;">入力 X (mm)</th>
                                <th style="width:14%;">入力 Z (mm)</th>
                                <th style="width:14%;">出力 X (m)</th>
                                <th style="width:14%;">出力 Y (m)</th>
                                <th style="width:14%;">出力 Z (m)</th>
                            </tr>
                        </thead>
                        <tbody id="gridBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- スプリッタ -->
            <div class="splitter" id="splitter"></div>

            <!-- 右ペイン: タブ (配置図 / 生データ) -->
            <div class="panel-preview">
                <div class="tabs">
                    <div class="tab active" data-pane="panePlot" id="tabPlot">
                        <svg><use href="#i-map"/></svg><span id="tabPlotText">配置図 (P 杭)</span>
                    </div>
                    <div class="tab" data-pane="paneOut" id="tabOut">
                        <svg><use href="#i-file-out"/></svg><span id="tabOutText">出力 CSV</span>
                    </div>
                    <div class="tab" data-pane="paneRaw" id="tabRaw">
                        <svg><use href="#i-code"/></svg><span id="tabRawText">読み込んだ CSV</span>
                    </div>
                </div>
                <div class="tab-panes">
                    <div class="tab-pane active" id="panePlot">
                        <canvas id="plotCanvas"></canvas>
                    </div>
                    <div class="tab-pane" id="paneOut">
                        <div class="pane-toolbar">
                            <span id="outInfo" class="pane-toolbar-info">プレビュー</span>
                            <span class="spacer"></span>
                            <button id="btnCopyOut" class="btn btn-ghost" disabled>
                                <svg><use href="#i-copy"/></svg>クリップボードにコピー
                            </button>
                        </div>
                        <textarea id="outText" class="raw-text" readonly placeholder="CSV を読み込むと、ここに出力プレビューが表示されます"></textarea>
                    </div>
                    <div class="tab-pane" id="paneRaw">
                        <textarea id="rawText" class="raw-text" readonly placeholder="ここに CSV の生データが表示されます"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== ステータスバー ===== -->
        <div class="statusbar" id="statusbar">CSV ファイルを読み込んでください。</div>
    </div>

    <script src="js/converter.js"></script>
    <script src="js/plot.js"></script>
    <script src="js/dialogs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
